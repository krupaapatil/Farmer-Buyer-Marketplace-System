<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmer-Buyer Marketplace</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="hero">
    <div class="hero__content">
      <h1>Farmer-Buyer Marketplace</h1>
      <div class="hero__stats">
        <div class="stat-card">
          <span id="farmerCount">0</span>
          <label>Farmers</label>
        </div>
        <div class="stat-card">
          <span id="buyerCount">0</span>
          <label>Buyers</label>
        </div>
        <div class="stat-card">
          <span id="matchCount">0</span>
          <label>Latest Matches</label>
        </div>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>Add Farmer</h2>
      <form id="farmerForm" class="form-grid">
        <label class="field">
          <span>Farmer ID</span>
          <input name="id" placeholder="Farmer ID" required>
        </label>
        <label class="field">
          <span>Name</span>
          <input name="name" placeholder="Name" required>
        </label>
        <label class="field">
          <span>City</span>
          <input name="city" placeholder="City" required>
        </label>
        <label class="field">
          <span>Phone</span>
          <input name="phone" placeholder="Phone" required>
        </label>
        <label class="field">
          <span>Crop Type</span>
          <select name="cropType" required></select>
        </label>
        <label class="field">
          <span>Quantity Available</span>
          <div class="input-combo">
            <input name="quantityAvailableDisplay" type="number" min="0" step="0.01" placeholder="Enter quantity" required>
            <select name="quantityAvailableUnit" required></select>
          </div>
        </label>
        <label class="field field--span-2">
          <span>Price Per Kg</span>
          <input name="pricePerUnit" type="number" min="0" step="0.01" placeholder="Price Per Kg" required>
        </label>
        <div class="field field--span-2 field--action">
          <button type="submit" class="primary">Add Farmer</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <h2>Add Buyer</h2>
      <form id="buyerForm" class="form-grid">
        <label class="field">
          <span>Buyer ID</span>
          <input name="id" placeholder="Buyer ID" required>
        </label>
        <label class="field">
          <span>Name</span>
          <input name="name" placeholder="Name" required>
        </label>
        <label class="field">
          <span>City</span>
          <input name="city" placeholder="City" required>
        </label>
        <label class="field">
          <span>Phone</span>
          <input name="phone" placeholder="Phone" required>
        </label>
        <label class="field">
          <span>Required Crop</span>
          <select name="requiredCrop" required></select>
        </label>
        <label class="field">
          <span>Required Quantity</span>
          <div class="input-combo">
            <input name="requiredQuantityDisplay" type="number" min="0" step="0.01" placeholder="Enter quantity" required>
            <select name="requiredQuantityUnit" required></select>
          </div>
        </label>
        <label class="field field--span-2">
          <span>Max Budget Per Kg</span>
          <input name="maxBudget" type="number" min="0" step="0.01" placeholder="Max Budget Per Kg" required>
        </label>
        <div class="field field--span-2 field--action">
          <button type="submit" class="primary">Add Buyer</button>
        </div>
      </form>
    </section>

    <section class="panel panel--wide">
      <div class="panel__header">
        <h2>Farmers</h2>
        <form id="farmerSearchForm" class="inline-form">
          <label class="field field--compact">
            <span>Crop</span>
            <select name="crop"></select>
          </label>
          <label class="field field--compact">
            <span>City</span>
            <input name="city" placeholder="Search by city">
          </label>
          <button type="submit">Search</button>
          <button type="button" id="resetFarmerSearch">Show All</button>
        </form>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>City</th>
              <th>Phone</th>
              <th>Crop</th>
              <th>Qty (kg)</th>
              <th>Price / kg</th>
            </tr>
          </thead>
          <tbody id="farmersTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel panel--wide">
      <div class="panel__header">
        <h2>Buyers</h2>
        <form id="buyerSearchForm" class="inline-form">
          <label class="field field--compact">
            <span>Crop</span>
            <select name="crop"></select>
          </label>
          <label class="field field--compact">
            <span>City</span>
            <input name="city" placeholder="Search by city">
          </label>
          <button type="submit">Search</button>
          <button type="button" id="resetBuyerSearch">Show All</button>
        </form>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>City</th>
              <th>Phone</th>
              <th>Crop</th>
              <th>Qty (kg)</th>
              <th>Budget / kg</th>
            </tr>
          </thead>
          <tbody id="buyersTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel__header">
        <h2>Match Center</h2>
        <div class="inline-form">
          <select id="buyerMatchSelect"></select>
          <button id="matchSelectedButton" class="primary">Match Selected Buyer</button>
          <button id="matchAllButton">Match All</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Buyer</th>
              <th>Farmer</th>
              <th>Crop</th>
              <th>City</th>
              <th>Qty (kg)</th>
              <th>Price / kg</th>
              <th>Score</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="matchesTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel__header">
        <h2>Reports & Files</h2>
        <div class="inline-form">
          <button id="saveButton" class="primary">Save Data</button>
          <button id="loadButton">Reload Data</button>
        </div>
      </div>
      <textarea id="reportArea" readonly></textarea>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>
  <script src="/app.js"></script>
</body>
</html>
